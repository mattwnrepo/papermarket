name: Update Market Data & Bot Trades

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRITICAL: Gets all history so rebase works

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch Polymarket data & get Gemini bot decision
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/update.mjs

      - name: Commit and Push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add docs/data/markets.json docs/data/bot_trades.json
          
          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "chore: update market data & bot trades [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            
            # Re-pull everything right before pushing to catch any edits you made 2 minutes ago
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit"
          fi
