name: "Update Market Data & Bot Trades"

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: true
 
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install dependencies
        run: npm install node-fetch@3
 
      - name: Fetch Polymarket data & get Gemini bot decision
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/update.mjs
 
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/markets.json docs/data/bot_trades.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update market data & bot trades [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          # Retry loop — set +e so a failed push doesn't kill the step.
          set +e
          for i in 1 2 3; do
            git push origin HEAD:main
            if [ $? -eq 0 ]; then
              echo "✅ Push succeeded (attempt $i)" && exit 0
            fi
            echo "Push rejected, fetching remote and retrying (attempt $i)…"
            git fetch origin main
            git checkout origin/main -- .
            git checkout HEAD -- docs/data/markets.json docs/data/bot_trades.json
            git add docs/data/markets.json docs/data/bot_trades.json
            git diff --staged --quiet || git commit --amend --no-edit
            sleep $((i * 5))
          done
          set -e
          echo "❌ All push attempts failed" && exit 1
