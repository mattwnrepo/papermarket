- name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Stage the files first
          git add docs/data/markets.json docs/data/bot_trades.json
          
          # 2. Check if there are actually changes to save
          if ! git diff --staged --quiet; then
            git commit -m "chore: update market data & bot trades [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            
            # 3. CRITICAL: Sync with the edits you just made before pushing
            git pull --rebase origin main
            
            git push origin main
          else
            echo "No changes to commit"
          fi
