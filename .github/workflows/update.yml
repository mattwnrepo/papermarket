name: "Update Market Data & Bot Trades"

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:
  
# Cancel any in-progress run when a new one triggers.
# This ensures only one run is ever writing to the repo at a time,
# completely eliminating the race condition that causes merge conflicts.
concurrency:
  group: update-data
  cancel-in-progress: true
 
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install dependencies
        run: npm install node-fetch@3
 
      - name: Fetch Polymarket data & get Gemini bot decision
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/update.mjs
 
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/markets.json docs/data/bot_trades.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update market data & bot trades [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
